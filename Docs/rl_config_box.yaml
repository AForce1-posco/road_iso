# ============================================================================
# 박스 단일 케이스 PPO 설정 (minimal-cycle-boxes 브랜치, boxpack001)
# ----------------------------------------------------------------------------
# 실행: conda activate mlagents-x86
#       mlagents-learn Docs/rl_config_box.yaml --run-id=boxpack001_ppo --force
#       → "Listening..." 뜨면 Unity Play (Behavior Type=Default)
#
# 특징: 순수 PPO (BC·GAIL 없음). 단일 고정 manifest + Option C 라 워밍스타트 불필요.
#   PlacementAgent 세팅: useFixedManifest ✓ · fixedManifest = boxpack001(B-004×8·SYN-04×4·SYN-03×4)
#                        useGatedPool ✗ · guaranteedCompletion ✓ · binPackerHeuristic ✗ · Behavior Type=Default
#   자동 산정: 풀=manifest 3종 → obs 350 · action (3, 341, 2)
# ============================================================================
behaviors:
  PlacementAgent:                   # ← Behavior Parameters 의 Behavior Name 과 일치
    trainer_type: ppo

    hyperparameters:
      batch_size: 128
      buffer_size: 2048
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 1.0e-2                  # 엔트로피 — 단일 케이스 탐색 유지
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      hidden_units: 256             # obs 350·action 소형 → 256 충분
      num_layers: 2
      normalize: true
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      # BC·GAIL 없음 — 단일 고정 케이스 + Option C 라 순수 PPO 로 충분

    max_steps: 300000               # 단일 케이스는 빨리 배움. 곡선 보며 조절
    time_horizon: 64
    summary_freq: 5000              # 단일 케이스라 자주 찍어 곡선 관찰
    keep_checkpoints: 5
    checkpoint_interval: 50000
    threaded: true
