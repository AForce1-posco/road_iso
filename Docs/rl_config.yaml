# ============================================================================
# 정적 배치 RL 학습 설정 (S4) - road_iso / PlacementAgent
# ----------------------------------------------------------------------------
# 실행: conda activate mlagents-x86
#       mlagents-learn Docs/rl_config.yaml --run-id=placement_v1
#       -> "Start training..." 뜨면 Unity에서 RLTraining 씬 Play
#       (Behavior Type을 Heuristic Only가 아닌 Default로 바꿔야 트레이너와 연결됨)
#
# 관측: 총 114 (높이맵 96 + CoG3 + 질량1 + 인덱2 + 종류12)
#       실제로는 3브랜치 (종류12 * 96 * 회전2)
#
# 에피소드 = 화물 3~5개 배치 (커리큘럼 1단계, 좁음)
#
# 알고리즘 교체: trainer_type을 ppo -> sac 로 바꾸면 SAC 실행 (환경 재작성 불필요).
#              마스크는 ml-agents PPO/SAC 가 네이티브 지원 (Maskable PPO 기본 동작).
# ============================================================================

behaviors:
  PlacementAgent:                   # Behavior Parameters의 Behavior Name과 반드시 일치
    trainer_type: ppo

    hyperparameters:
      batch_size: 128               # 연속행동 -> 작게
      buffer_size: 2048             # batch_size의 배수 (2048 / 128 = 16)
      learning_rate: 3.0e-4
      learning_rate_schedule: linear
      beta: 5.0e-3                  # 엔트로피 계수 = 탐색-이산 오버슈트 중요
      epsilon: 0.2                  # PPO clip
      lambd: 0.95                   # GAE lambda
      num_epoch: 3

    network_settings:
      hidden_units: 256             # 관측 114 -> 256
      num_layers: 2
      normalize: true               # 관측 스케일 다름(높이맵/질량/개수) -> 정규화 ON
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 500000               # 1단계 기준값, 곡선 보면 수정
    time_horizon: 64                # 에피소드가 짧아 작게
    summary_freq: 10000             # TensorBoard 기록 주기
    keep_checkpoints: 5
    checkpoint_interval: 50000
    threaded: true